[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "deltakv"
version = "0.1.0"
description = "DeltaKV: Compressing KV Cache for Efficient Inference"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [
    {name = "DeltaKV Team"}
]
dependencies = [
    "fire",
    "torch==2.8.0+cu128; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "triton==3.4.0; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "transformers[torch]",
    "accelerate",
    "deepspeed",
    "datasets",
    "matplotlib",
    "seaborn",
    "wandb",
    "loguru",
    "ansible",
    "bitsandbytes",
    "flash-attn==2.8.3; python_version == '3.10' and sys_platform == 'linux' and platform_machine == 'x86_64'",
    "datatrove",
    "tqdm",
    "fuzzywuzzy",
    "loguru",
    "jieba",
    "jsonlines",
    "rich",
    "rouge",
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
]

[project.scripts]
deltakv-train = "deltakv.train_compressor:main"
sparsevllm-openai-server = "sparsevllm.entrypoints.openai.api_server:main"
sparsevllm-openai-client = "sparsevllm.entrypoints.openai.client:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["deltakv*", "sparsevllm*"]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' and platform_machine == 'x86_64'" },
]
transformers = { git = "https://github.com/huggingface/transformers.git", rev = "801413961815dad5f943b77bb83645c5ef7bcc82" }
"flash-attn" = { url = "https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3/flash_attn-2.8.3%2Bcu12torch2.8cxx11abiTRUE-cp310-cp310-linux_x86_64.whl", marker = "python_version == '3.10' and sys_platform == 'linux' and platform_machine == 'x86_64'" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
